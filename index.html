<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Agriculture Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7f6;
        }

        header {
            background: #1e7f3f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr;
        }

        .sidebar {
            background: #2d3436;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
        }

        .main {
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0;
            color: #555;
        }

        .value {
            font-size: 24px;
            margin-top: 10px;
            color: #1e7f3f;
        }

        .status-on {
            color: green;
            font-weight: bold;
        }

        .status-off {
            color: red;
            font-weight: bold;
        }

        button {
            padding: 10px;
            background: #1e7f3f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #166532;
        }
    </style>
</head>
<body>

<header>
    🌱 IoT Based Soil Fertility & Crop Recommendation Dashboard
</header>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Menu</h2>
        <a href="#">Dashboard</a>
        <a href="#">Live Data</a>
        <a href="#">Irrigation</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <h2>Live Sensor Data</h2>

        <div class="cards">

            <div class="card">
                <h3>Soil Moisture</h3>
                <div class="value" id="moisture">45%</div>
            </div>

            <div class="card">
                <h3>Temperature</h3>
                <div class="value" id="temp">28°C</div>
            </div>

            <div class="card">
                <h3>Humidity</h3>
                <div class="value" id="humidity">60%</div>
            </div>

            <div class="card">
                <h3>Soil NPK</h3>
                <div class="value" id="npk">N:78 P:36 K:52</div>
            </div>

            <div class="card">
                <h3>Irrigation Status</h3>
                <div class="value status-on" id="irrigation">ON</div>
            </div>

        </div>

        <br>

        <h2>Control Irrigation</h2>
        <button onclick="toggleIrrigation()">Toggle Irrigation</button>

        <br><br>

        <h2>Recommended Crop</h2>
        <div class="card">
            <h3 id="crop">Tomato 🍅</h3>
        </div>

    </div>

</div>

<script>
    // Simulated real-time data update
    setInterval(() => {
        document.getElementById("moisture").innerText = Math.floor(Math.random() * 100) + "%";
        document.getElementById("temp").innerText = (25 + Math.random()*5).toFixed(1) + "°C";
        document.getElementById("humidity").innerText = Math.floor(Math.random() * 100) + "%";
    }, 3000);

    function toggleIrrigation() {
        let status = document.getElementById("irrigation");

        if (status.innerText === "ON") {
            status.innerText = "OFF";
            status.className = "value status-off";
        } else {
            status.innerText = "ON";
            status.className = "value status-on";
        }
    }
</script>

</body>
</html>
